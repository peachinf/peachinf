<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>계량 프로그램</title>
<style>
:root{--blue:#1565C0;--blue-lt:#E3F2FD;--green:#2E7D32;--red:#C62828;--gray:#f5f6f8;--border:#e8eaed;--text:#1a1a2e;--sub:#6b7280;--white:#fff;--radius:10px;--shadow:0 1px 4px rgba(0,0,0,.10)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Malgun Gothic',-apple-system,sans-serif;background:var(--gray);color:var(--text);font-size:15px;min-height:100vh}
.header{background:var(--blue);color:white;padding:14px 16px 12px;position:sticky;top:0;z-index:200}
.header-title{font-size:17px;font-weight:700}
.header-sub{font-size:11px;opacity:.75;margin-top:1px}
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:190}
.tab{flex:1;padding:13px 8px 11px;text-align:center;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;user-select:none}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.page{padding:14px 14px 90px;max-width:500px;margin:0 auto;display:none}
.page.on{display:block}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.fg{margin-bottom:10px}.fg:last-child{margin-bottom:0}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px}
.fg input,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;color:var(--text);background:var(--white);-webkit-appearance:none;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue)}
.fg input[readonly]{background:#f8faff;color:var(--blue);font-weight:700}
.row{display:flex;gap:8px}.row .fg{flex:1}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;user-select:none}
.btn:active{opacity:.8;transform:scale(.98)}
.btn-blue{background:var(--blue);color:white}
.btn-green{background:var(--green);color:white}
.btn-gray{background:#e9eaec;color:#444}
.btn-row{display:flex;gap:8px;margin-bottom:8px}.btn-row .btn{margin:0}
.search-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.search-box .row{margin-bottom:8px;align-items:center}
.search-box .row span{color:var(--sub);font-size:14px;padding:0 2px}
.search-box input,.search-box select{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:white;-webkit-appearance:none}
.search-box input:focus,.search-box select:focus{outline:none;border-color:var(--blue)}
.sum-bar{text-align:right;font-size:12px;color:var(--sub);padding:4px 4px 8px}
.rec{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;flex-direction:column;gap:6px;border-left:4px solid var(--blue);user-select:none;-webkit-user-select:none;}
.rec.sell{border-left-color:var(--red)}
.rec:active{opacity:.85}
.rec-row1{display:flex;justify-content:space-between;align-items:center}
.rec-row2{display:flex;justify-content:space-between;align-items:center;gap:6px}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
.badge-buy{background:var(--blue-lt);color:var(--blue)}
.badge-sell{background:#fce4ec;color:var(--red)}
.biz-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-right:4px;}
.rec-car{font-size:12px;color:#bbb;margin-left:6px}
.rec-date{font-size:11px;color:#bbb;flex-shrink:0}
.rec-company{font-size:14px;font-weight:900;color:#111;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-middle{font-size:12px;color:#666;flex:1;text-align:center;white-space:nowrap}
.rec-amount{font-size:17px;font-weight:700;color:var(--blue);flex:1;text-align:right;white-space:nowrap}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,30,.9);color:white;padding:11px 22px;border-radius:24px;font-size:14px;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:40px 0;color:var(--sub);font-size:14px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--sub);font-size:14px}
.fl{font-size:13px;font-weight:700;color:var(--sub);white-space:nowrap;padding:6px 8px 6px 0;vertical-align:middle;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
<div class="header-title">&#9878; 계량 프로그램</div>
<div class="header-sub" id="syncStatus">서버 연결 중...</div>
</div>
<div class="tabs">
<div class="tab on" id="tab0" onclick="switchTab(0)">계량등록</div>
<div class="tab" id="tab1" onclick="switchTab(1)">계량기록</div>
</div>

<!-- bizType 팝업 -->
<div id="bizPop" style="display:none;position:fixed;background:#fff;border:1px solid #c0cfe0;border-radius:6px;padding:4px;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,0.15);flex-direction:row;gap:4px;">
  <button onclick="selectBiz('의')" style="padding:6px 14px;font-size:13px;font-weight:700;border-radius:4px;border:1px solid #185FA5;background:#E6F1FB;color:#0C447C;cursor:pointer;">의</button>
  <button onclick="selectBiz('개')" style="padding:6px 14px;font-size:13px;font-weight:700;border-radius:4px;border:1px solid #3B6D11;background:#EAF3DE;color:#27500A;cursor:pointer;">개</button>
  <button onclick="selectBiz('법')" style="padding:6px 14px;font-size:13px;font-weight:700;border-radius:4px;border:1px solid #854F0B;background:#FAEEDA;color:#633806;cursor:pointer;">법</button>
</div>

<div class="page on" id="page0">
<div class="card" style="margin-top:6px;padding:10px;">
<table style="width:100%;border-collapse:collapse;">
<colgroup><col style="width:76px"><col style="width:90px"><col></colgroup>
<tr><td class="fl">구분</td><td colspan="2" style="padding:3px 0;">
<select id="fType" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:inherit;">
<option value="매입" selected>매입</option>
<option value="매출">매출</option>
</select>
</td></tr>
<tr><td class="fl">계량일자</td><td colspan="2" style="padding:3px 0;"><input type="date" id="fDate" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:inherit;"></td></tr>
<tr><td class="fl">차량번호</td><td colspan="2" style="padding:3px 0;"><input type="text" id="fCar" autocomplete="off" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:inherit;"></td></tr>
<tr><td class="fl">거래처</td><td colspan="2" style="padding:3px 0;">
  <div style="display:flex;align-items:center;gap:6px;">
    <button type="button" id="bizBtn" onclick="toggleBizPop(event)" style="width:32px;height:32px;border-radius:4px;border:1px solid #ccc;background:#f5f5f5;color:#aaa;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="8" height="10" rx="1" stroke="#aaa" stroke-width="1.2" fill="none"/><line x1="3" y1="4" x2="7" y2="4" stroke="#aaa" stroke-width="1"/><line x1="3" y1="6" x2="7" y2="6" stroke="#aaa" stroke-width="1"/><line x1="3" y1="8" x2="5.5" y2="8" stroke="#aaa" stroke-width="1"/><circle cx="11" cy="10" r="2.5" fill="#aaa"/><text x="11" y="12" text-anchor="middle" font-size="3.5" fill="white" font-weight="bold">₩</text></svg>
    </button>
    <input type="text" id="fCompany" autocomplete="off" style="flex:1;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:inherit;">
  </div>
</td></tr>
<tr><td class="fl">품목</td><td colspan="2" style="padding:3px 0;"><input type="text" id="fItem" autocomplete="off" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:inherit;"></td></tr>
<tr>
<td class="fl">총중량</td>
<td style="padding:3px 4px 3px 0;"><input type="time" id="fGrossTime" style="width:100%;padding:7px 4px;border:1px solid #ccc;border-radius:4px;font-size:14px;font-family:inherit;"></td>
<td style="padding:3px 0;"><input type="text" id="fGross" inputmode="numeric" placeholder="0" oninput="onGrossInput()" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;text-align:right;font-family:inherit;"></td>
</tr>
<tr>
<td class="fl">공차중량</td>
<td style="padding:3px 4px 3px 0;"><input type="time" id="fTareTime" style="width:100%;padding:7px 4px;border:1px solid #ccc;border-radius:4px;font-size:14px;font-family:inherit;"></td>
<td style="padding:3px 0;"><input type="text" id="fTare" inputmode="numeric" placeholder="0" oninput="onTareInput()" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;text-align:right;font-family:inherit;"></td>
</tr>
<tr>
<td class="fl">감량</td>
<td style="padding:3px 4px 3px 0;"><div style="display:flex;align-items:center;gap:2px;"><input type="number" id="fLossRate" inputmode="numeric" placeholder="0" oninput="onRateInput()" style="width:60%;padding:7px 4px;border:1px solid #ccc;border-radius:4px;font-size:14px;text-align:right;font-family:inherit;"><span style="font-size:13px;color:#666;">%</span></div></td>
<td style="padding:3px 0;"><input type="number" id="fLoss" inputmode="numeric" placeholder="0" oninput="onLossInput()" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;text-align:right;font-family:inherit;"></td>
</tr>
<tr><td class="fl">인수량</td><td colspan="2" style="padding:3px 0;"><input type="text" id="fReal" readonly style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;text-align:right;background:#f5f5f5;font-family:inherit;"></td></tr>
<tr><td class="fl">단가</td><td colspan="2" style="padding:3px 0;"><input type="number" id="fPrice" inputmode="numeric" placeholder="0" oninput="calcAll()" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;text-align:right;font-family:inherit;"></td></tr>
<tr><td class="fl">금액</td><td colspan="2" style="padding:3px 0;"><input type="text" id="fAmount" readonly style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:16px;font-weight:700;text-align:right;background:#f5f5f5;font-family:inherit;"></td></tr>
<tr><td class="fl">비고</td><td colspan="2" style="padding:3px 0;"><input type="text" id="fMemo" autocomplete="off" style="width:100%;padding:7px 8px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:inherit;"></td></tr>
</table>
</div>
<div class="btn-row" style="margin-bottom:20px;">
<button class="btn btn-gray" style="flex:1;padding:11px;" onclick="resetForm()">초기화</button>
<button class="btn btn-blue" style="flex:1;padding:11px;" onclick="saveRecord()">저장</button>
<button class="btn btn-green" style="flex:1;padding:11px;" onclick="genCertImg()">계근</button>
<button class="btn btn-green" style="flex:1;padding:11px;" onclick="genBuyImg()">매입</button>
</div>
</div>

<div class="page" id="page1">
<div class="search-box">
<div class="row" style="margin-bottom:8px;align-items:center;">
<select id="sType" style="flex:0 0 65px;padding:9px 4px;text-align:center;text-align-last:center;font-size:13px;">
<option value="전체">전체</option>
<option value="매입" selected>매입</option>
<option value="매출">매출</option>
</select>
<input type="date" id="sFrom" style="flex:1;min-width:0;font-size:13px;padding:9px 2px;letter-spacing:-1px;">
<span style="flex-shrink:0;padding:0 2px;">~</span>
<input type="date" id="sTo" style="flex:1;min-width:0;font-size:13px;padding:9px 2px;letter-spacing:-1px;">
</div>
<div class="row" style="align-items:center;">
<input type="text" id="sKw" placeholder="차량·거래처 검색" style="flex:1" oninput="renderList()">
<button class="btn btn-blue" style="flex:0 0 80px;padding:10px;margin:0;" onclick="loadRecords()">새로고침</button>
</div>
</div>
<div id="sumBar" class="sum-bar"></div>
<div id="recList"></div>
</div>

<script>
var SERVER='https://peachinf-16192067572.europe-west1.run.app';
var records=[];
var _editId=null;
var _bizType='';
var BIZ_COLOR={'의':{bg:'#E6F1FB',color:'#0C447C',border:'#185FA5'},'개':{bg:'#EAF3DE',color:'#27500A',border:'#3B6D11'},'법':{bg:'#FAEEDA',color:'#633806',border:'#854F0B'}};

function vib(){try{if(window.AndroidShare)window.AndroidShare.vibrate();}catch(e){}}

window.onload=function(){
  var today=todayStr(),now=new Date();
  document.getElementById('fDate').value=today;
  document.getElementById('fGrossTime').value=hhmm(now);
  document.getElementById('sFrom').value=today.slice(0,7)+'-01';
  document.getElementById('sTo').value=today;
  loadRecords();
  document.addEventListener('click',function(e){
    var pop=document.getElementById('bizPop');
    var btn=document.getElementById('bizBtn');
    if(pop.style.display==='flex'&&!pop.contains(e.target)&&!btn.contains(e.target)){
      pop.style.display='none';
    }
  });
};

function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function hhmm(d){return pad(d.getHours())+':'+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,'0');}
function pn(s){return parseFloat(String(s||0).replace(/,/g,''))||0;}
function fmt(v){return v?Number(v).toLocaleString('ko-KR'):'0';}

function toggleBizPop(e){
  e.stopPropagation();
  var pop=document.getElementById('bizPop');
  var rect=e.currentTarget.getBoundingClientRect();
  if(pop.style.display==='flex'){pop.style.display='none';return;}
  pop.style.left=rect.left+'px';
  pop.style.top=(rect.bottom+4)+'px';
  pop.style.display='flex';
}

function selectBiz(t){
  _bizType=_bizType===t?'':t;
  var btn=document.getElementById('bizBtn');
  if(_bizType){
    var s=BIZ_COLOR[_bizType];
    btn.innerHTML=_bizType;
    btn.style.background=s.bg;btn.style.color=s.color;btn.style.border='2px solid '+s.border;
  } else {
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="8" height="10" rx="1" stroke="#aaa" stroke-width="1.2" fill="none"/><line x1="3" y1="4" x2="7" y2="4" stroke="#aaa" stroke-width="1"/><line x1="3" y1="6" x2="7" y2="6" stroke="#aaa" stroke-width="1"/><line x1="3" y1="8" x2="5.5" y2="8" stroke="#aaa" stroke-width="1"/><circle cx="11" cy="10" r="2.5" fill="#aaa"/><text x="11" y="12" text-anchor="middle" font-size="3.5" fill="white" font-weight="bold">₩</text></svg>';
    btn.style.background='#f5f5f5';btn.style.color='#aaa';btn.style.border='1px solid #ccc';
  }
  document.getElementById('bizPop').style.display='none';
}

function resetBiz(){
  _bizType='';
  var btn=document.getElementById('bizBtn');
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="8" height="10" rx="1" stroke="#aaa" stroke-width="1.2" fill="none"/><line x1="3" y1="4" x2="7" y2="4" stroke="#aaa" stroke-width="1"/><line x1="3" y1="6" x2="7" y2="6" stroke="#aaa" stroke-width="1"/><line x1="3" y1="8" x2="5.5" y2="8" stroke="#aaa" stroke-width="1"/><circle cx="11" cy="10" r="2.5" fill="#aaa"/><text x="11" y="12" text-anchor="middle" font-size="3.5" fill="white" font-weight="bold">₩</text></svg>';
  btn.style.background='#f5f5f5';btn.style.color='#aaa';btn.style.border='1px solid #ccc';
}

function setBiz(t){
  _bizType=t||'';
  var btn=document.getElementById('bizBtn');
  if(_bizType){
    var s=BIZ_COLOR[_bizType];
    btn.innerHTML=_bizType;
    btn.style.background=s.bg;btn.style.color=s.color;btn.style.border='2px solid '+s.border;
  } else {
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="8" height="10" rx="1" stroke="#aaa" stroke-width="1.2" fill="none"/><line x1="3" y1="4" x2="7" y2="4" stroke="#aaa" stroke-width="1"/><line x1="3" y1="6" x2="7" y2="6" stroke="#aaa" stroke-width="1"/><line x1="3" y1="8" x2="5.5" y2="8" stroke="#aaa" stroke-width="1"/><circle cx="11" cy="10" r="2.5" fill="#aaa"/><text x="11" y="12" text-anchor="middle" font-size="3.5" fill="white" font-weight="bold">₩</text></svg>';
    btn.style.background='#f5f5f5';btn.style.color='#aaa';btn.style.border='1px solid #ccc';
  }
}

function switchTab(i){vib();
  [0,1].forEach(function(j){
    document.getElementById('tab'+j).classList.toggle('on',i===j);
    document.getElementById('page'+j).classList.toggle('on',i===j);
  });
  if(i===1) renderList();
}

var _sync=false;
function onGrossInput(){
  var el=document.getElementById('fGross');
  var raw=el.value.replace(/,/g,'');
  if(raw&&!isNaN(raw)) el.value=Number(raw).toLocaleString('ko-KR');
  var now=new Date();
  var gt=document.getElementById('fGrossTime');
  if(!gt.value) gt.value=hhmm(now);
  calcAll();
}
function onTareInput(){
  var el=document.getElementById('fTare');
  var raw=el.value.replace(/,/g,'');
  if(raw&&!isNaN(raw)) el.value=Number(raw).toLocaleString('ko-KR');
  var now=new Date();
  var tt=document.getElementById('fTareTime');
  if(!tt.value) tt.value=hhmm(now);
  calcAll();
}
function calcAll(){
  var g=pn(document.getElementById('fGross').value.replace(/,/g,''));
  var t=pn(document.getElementById('fTare').value.replace(/,/g,''));
  var l=pn(document.getElementById('fLoss').value);
  var real=Math.max(g-t-l,0);
  var p=pn(document.getElementById('fPrice').value);
  document.getElementById('fReal').value=real?fmt(real):'';
  document.getElementById('fAmount').value=(real&&p)?fmt(real*p):'';
}
function onRateInput(){
  if(_sync)return;_sync=true;
  var base=pn(document.getElementById('fGross').value)-pn(document.getElementById('fTare').value);
  var rate=pn(document.getElementById('fLossRate').value);
  if(base>0)document.getElementById('fLoss').value=Math.round(base*rate/100)||'';
  calcAll();_sync=false;
}
function onLossInput(){
  if(_sync)return;_sync=true;
  var base=pn(document.getElementById('fGross').value)-pn(document.getElementById('fTare').value);
  var loss=pn(document.getElementById('fLoss').value);
  if(base>0)document.getElementById('fLossRate').value=Math.round(loss/base*100)||0;
  calcAll();_sync=false;
}
function resetForm(){vib();
  var now=new Date();
  _editId=null;
  resetBiz();
  document.getElementById('fType').value='매입';
  document.getElementById('fGrossTime').value=hhmm(now);
  document.getElementById('fTareTime').value='';
  ['fCar','fCompany','fItem','fMemo'].forEach(function(id){document.getElementById(id).value='';});
  ['fGross','fTare','fLossRate','fLoss','fPrice'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('fReal').value='';
  document.getElementById('fAmount').value='';
}

var _lastKw='';
async function loadRecords(){vib();
  var curKw=document.getElementById('sKw').value;
  if(curKw&&curKw===_lastKw){document.getElementById('sKw').value='';_lastKw='';}
  else{_lastKw=curKw;}
  document.getElementById('recList').innerHTML='<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  document.getElementById('syncStatus').textContent='동기화 중...';
  try{
    var res=await fetch(SERVER+'/records/json');
    var json=await res.json();
    records=json.records||[];
    document.getElementById('syncStatus').textContent=records.length+'건 · '+todayStr();
    renderList();
  }catch(e){
    document.getElementById('syncStatus').textContent='연결 실패';
    document.getElementById('recList').innerHTML='<div class="empty">서버 연결 실패</div>';
    toast('서버 연결 실패');
  }
}

async function saveRecord(){vib();
  var car=document.getElementById('fCar').value.trim();
  var comp=document.getElementById('fCompany').value.trim();
  if(!car||!comp){toast('차량번호와 거래처를 입력하세요');return;}
  var now=new Date();
  var body={

function renderList(){
  var from=document.getElementById('sFrom').value;
  var to=document.getElementById('sTo').value;
  var type=document.getElementById('sType').value;
  var kw=(document.getElementById('sKw').value||'').trim().toLowerCase();
  var filtered=records.filter(function(r){
    if(!r.date)return false;
    if(from&&r.date<from)return false;
    if(to&&r.date>to)return false;
    if(type!=='전체'&&r.type!==type)return false;
    if(kw&&![r.car,r.company,r.item,r.memo].join(' ').toLowerCase().includes(kw))return false;
    return true;
  }).sort(function(a,b){return((b.date||'')+(b.id||''))>((a.date||'')+(a.id||''))?1:-1;});

  var tR=filtered.reduce(function(s,r){return s+(Number(r.real)||0);},0);
  var tA=filtered.reduce(function(s,r){return s+(Number(r.amount)||0);},0);
  document.getElementById('sumBar').textContent=filtered.length+'건  |  인수량 '+fmt(tR)+' kg  |  금액 '+fmt(tA)+' 원';

  if(!filtered.length){document.getElementById('recList').innerHTML='<div class="empty">해당 기간 기록 없음</div>';return;}

  document.getElementById('recList').innerHTML=filtered.map(function(r){

    var mid=[r.item,fmt(r.real),fmt(r.price)].filter(Boolean).join(' · ');
    var bizHtml='';
    if(r.bizType&&BIZ_COLOR[r.bizType]){
      var s=BIZ_COLOR[r.bizType];
      bizHtml='<span class="biz-badge" style="background:'+s.bg+';color:'+s.color+';border:1px solid '+s.border+'">'+r.bizType+'</span>';

    return '<div class="rec'+(isSell?' sell':'')+'" onclick="loadToForm(\''+r.id+'\')" oncontextmenu="return false;" ontouchstart="startHold(\''+r.id+'\')" ontouchend="cancelHold()" ontouchmove="cancelHold()">'+

      '<div style="display:flex;align-items:center;">'+
      '<span class="badge '+(isSell?'badge-sell':'badge-buy')+'">'+r.type+'</span>'+
      '<span class="rec-car">'+(r.car||'')+'</span>'+
      '</div>'+
      '<span class="rec-date">'+(r.date||'')+'</span>'+

      '<div class="rec-row2">'+
      '<div style="display:flex;align-items:center;flex:1;min-width:0;">'+

      '<span class="rec-company">'+(r.company||'')+'</span>'+

var _holdTimer=null;
function startHold(id){
  _holdTimer=setTimeout(function(){
    _holdTimer=null;
    var r=records.find(function(x){return String(x.id)===String(id);});
    if(!r)return;
    if(!confirm('이 기록을 삭제할까요?'))return;
    fetch(SERVER+'/weighing/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:r.id,date:r.date,car:r.car,gross:r.gross,grossTime:r.grossTime})})
    .then(function(res){return res.json();}).then(function(json){
      if(json.ok){toast('삭제됨');loadRecords();}else toast('삭제 실패');
    }).catch(function(){toast('삭제 실패');});
  },700);
}
function cancelHold(){clearTimeout(_holdTimer);_holdTimer=null;}

  cx.beginPath();cx.moveTo(PAD+bw,y);cx.lineTo(PAD+bw,y+60);cx.stroke();
  cx.beginPath();cx.moveTo(PAD+bw*2,y);cx.lineTo(PAD+bw*2,y+60);cx.stroke();
  cx.fillStyle='#333';cx.font='15px sans-serif';cx.textAlign='center';
  cx.fillText('공급가액',PAD+bw/2,y+20);cx.fillText(fmt(Math.round(totAmt/1.1)),PAD+bw/2,y+45);
  cx.fillText('부가세액',PAD+bw+bw/2,y+20);cx.fillText(fmt(totAmt-Math.round(totAmt/1.1)),PAD+bw+bw/2,y+45);
  cx.fillText('합계금액',PAD+bw*2+bw/2,y+20);cx.font='bold 15px sans-serif';cx.fillText(fmt(totAmt),PAD+bw*2+bw/2,y+45);
  shareImg(cv,'거래명세서_'+company+'_'+from+'_'+to+'.jpg');
}

function shareImg(canvas,filename){
  var base64=canvas.toDataURL('image/jpeg',0.95);
  if(window.AndroidShare){window.AndroidShare.shareImage(base64,filename);}
  else{var a=document.createElement('a');a.href=base64;a.download=filename;a.click();}
}

var _tt;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('on');},2500);
}
</script>
